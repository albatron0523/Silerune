name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.upload-pages.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 💡 修正 1：升級 Node 24，並直接移除容易報錯的 cache 設定
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 💡 修正 2：改用 npm install，這樣就算沒有 lock 檔也能順利安裝
      - name: Install Dependencies & Build
        run: |
          cd Silerune
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Silerune/dist'

      - name: Deploy to GitHub Pages
        id: upload-pages
        uses: actions/deploy-pages@v4
