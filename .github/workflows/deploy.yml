name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 如果妳的主分支叫 master，請把這裡改成 master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        # 💡 這裡把所有的 npm ci 改成了 npm install，沒有 lock 檔也能跑！
        run: |
          if [ -f "Silerune/package.json" ]; then
            cd Silerune && npm install && npm run build
          else
            npm install && npm run build
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            dist
            Silerune/dist
            build
            Silerune/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
