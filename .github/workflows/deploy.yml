name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 如果妳的主分支叫 master，請把這裡改成 master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.upload-pages.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies & Build
        run: |
          if [ -f "Silerune/package.json" ]; then
            cd Silerune && npm install && npm run build
          else
            npm install && npm run build
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Find and Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Silerune/dist'

      - name: Deploy to GitHub Pages
        id: upload-pages
        uses: actions/deploy-pages@v4
